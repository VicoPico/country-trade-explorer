server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: country-trade-explorer
  datasource:
    url: jdbc:postgresql://${CTE_DB_HOST:localhost}:${CTE_DB_PORT:5434}/${CTE_DB_NAME:trade_explorer}
    username: ${CTE_DB_USER:postgres}
    password: ${CTE_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

uncomtrade:
  enabled: ${UNCOMTRADE_ENABLED:false}
  preview: ${UNCOMTRADE_PREVIEW:true}
  final-data-url: ${UNCOMTRADE_FINAL_DATA_URL:}
  api-key: ${UNCOMTRADE_API_KEY:}
  api-key-header-name: ${UNCOMTRADE_API_KEY_HEADER_NAME:Ocp-Apim-Subscription-Key}
  max-records: ${UNCOMTRADE_MAX_RECORDS:500}
  commodity-codes: ${UNCOMTRADE_COMMODITY_CODES:84,85,27,30,04,87,44,48,26,90,12}
