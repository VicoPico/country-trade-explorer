server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: country-trade-explorer
  datasource:
    url: jdbc:postgresql://${CTE_DB_HOST:localhost}:${CTE_DB_PORT:5434}/${CTE_DB_NAME:trade_explorer}
    username: ${CTE_DB_USER:postgres}
    password: ${CTE_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
