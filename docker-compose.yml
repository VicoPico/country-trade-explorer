version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: country-trade-postgres
    environment:
      POSTGRES_DB: trade_explorer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
